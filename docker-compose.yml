services:
  mysql:
    image: mysql:8.4
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: photos_showcase
      MYSQL_USER: photos_user
      MYSQL_PASSWORD: photos_pass
      MYSQL_ROOT_PASSWORD: root_pass_change_me
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_pass_change_me"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://photos_user:photos_pass@mysql:3306/photos_showcase
    volumes:
      # Persist uploaded photos outside the container
      - photos_data:/app/public/photos
    restart: unless-stopped

volumes:
  mysql_data:
  photos_data:
